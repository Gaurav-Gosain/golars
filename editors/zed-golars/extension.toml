id = "golars"
name = "golars"
description = "golars .glr scripting language support: syntax highlighting, LSP, and editor features."
version = "0.1.0"
schema_version = 1
authors = ["Gaurav Gosain <itsgauravgosain@gmail.com>"]
repository = "https://github.com/Gaurav-Gosain/golars"

[language_servers.golars-lsp]
name = "golars Language Server"
languages = ["golars"]

[grammars.golars]
# Grammar lives in-tree so the extension and command-set can never
# drift. Zed's extension host clones `repository` at `rev` and then
# runs `tree-sitter build` inside `path`; that keeps the distribution
# single-source without a mirror repo.
repository = "https://github.com/Gaurav-Gosain/golars"
rev = "main"
path = "editors/tree-sitter-golars"
