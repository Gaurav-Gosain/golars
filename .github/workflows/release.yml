name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  goreleaser:
    name: build + publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # AUR push uses a private SSH key registered at aur.archlinux.org.
      # When the secret is missing we pass --skip=aur so the release
      # still goes through and the brew tap update still runs.
      - name: run goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: >-
            release --clean
            ${{ secrets.AUR_SSH_KEY == '' && '--skip=aur' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}

  zed-extension:
    name: build + attach Zed extension package
    needs: goreleaser
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      # Prebuilt binaries: skips ~7 minutes of `cargo install` per
      # release. Bump the pins when adopting a newer zed_extension_api
      # or tree-sitter ABI.
      - name: install wasm-tools (prebuilt)
        env:
          WASM_TOOLS_VERSION: "1.220.0"
        run: |
          set -e
          url="https://github.com/bytecodealliance/wasm-tools/releases/download/v${WASM_TOOLS_VERSION}/wasm-tools-${WASM_TOOLS_VERSION}-x86_64-linux.tar.gz"
          tmp="$(mktemp -d)"
          curl -fsSL "$url" -o "$tmp/wasm-tools.tar.gz"
          tar -xzf "$tmp/wasm-tools.tar.gz" -C "$tmp"
          install -Dm755 "$tmp/wasm-tools-${WASM_TOOLS_VERSION}-x86_64-linux/wasm-tools" /usr/local/bin/wasm-tools
          wasm-tools --version

      - name: install tree-sitter CLI (prebuilt)
        env:
          TREE_SITTER_VERSION: "0.24.7"
        run: |
          set -e
          url="https://github.com/tree-sitter/tree-sitter/releases/download/v${TREE_SITTER_VERSION}/tree-sitter-linux-x64.gz"
          tmp="$(mktemp -d)"
          curl -fsSL "$url" -o "$tmp/tree-sitter.gz"
          gunzip "$tmp/tree-sitter.gz"
          install -Dm755 "$tmp/tree-sitter" /usr/local/bin/tree-sitter
          tree-sitter --version

      - name: build Zed extension package
        run: ./editors/zed-golars/build-package.sh "${GITHUB_REF_NAME#v}"

      - name: upload tarball to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          tarball="editors/zed-golars/dist/golars-zed-extension_${version}.tar.gz"
          gh release upload "${GITHUB_REF_NAME}" "$tarball" --clobber
