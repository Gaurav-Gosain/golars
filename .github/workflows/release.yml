name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  goreleaser:
    name: build + publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # AUR push uses a private SSH key registered at aur.archlinux.org.
      # When the secret is missing we pass --skip=aur so the release
      # still goes through and the brew tap update still runs.
      - name: run goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: >-
            release --clean
            ${{ secrets.AUR_SSH_KEY == '' && '--skip=aur' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}

  zed-extension:
    name: build + attach Zed extension package
    needs: goreleaser
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: install wasm-tools
        run: cargo install --locked wasm-tools

      - name: install tree-sitter CLI
        run: cargo install --locked tree-sitter-cli

      - name: build Zed extension package
        run: ./editors/zed-golars/build-package.sh "${GITHUB_REF_NAME#v}"

      - name: upload tarball to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          tarball="editors/zed-golars/dist/golars-zed-extension_${version}.tar.gz"
          gh release upload "${GITHUB_REF_NAME}" "$tarball" --clobber
